services:
  db:
    image: postgres:14
    container_name: acalogos-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:?DB_NAME is required}
      POSTGRES_USER: ${DB_USER:?DB_USER is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - acalogos_pgdata:/var/lib/postgresql/data

volumes:
  acalogos_pgdata:
